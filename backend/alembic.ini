# ============================================================
#  SentinelAI — Alembic Configuration
#  The database URL is overridden in alembic/env.py from
#  app.core.config.Settings — do not set it here.
# ============================================================

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Placeholder — overridden in env.py via Settings.database_url
sqlalchemy.url = placeholder

[post_write_hooks]
# No post-write hooks configured

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
